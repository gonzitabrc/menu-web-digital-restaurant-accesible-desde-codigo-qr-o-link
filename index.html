<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Restaurant</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #292d30;
}

#container {
  background-color: #292d30;
  width: 100%;
  height: 100vh; /* Usar 100vh en lugar de calc(100vh - 100px) */
}

iframe {
  border: none;
  width: 100%;
  height: 100%;
  display: block;
  background-color: #292d30;
}

#loadingMessage {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  color: red;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1000;
  font-family: 'Arial', sans-serif;
}
    </style>

    <script>
        function checkIframe() {
            const iframe = document.getElementById('iframeCotizador');
            const loadingMessage = document.getElementById('loadingMessage');

            loadingMessage.style.display = 'block';
            iframe.style.display = 'none';

            iframe.onload = function() {
                loadingMessage.style.display = 'none'; 
                iframe.style.display = 'block'; 
            };

            setTimeout(() => {
                try {
                    const iframeDocument = iframe.contentDocument || iframe.contentWindow.document;

                    if (iframeDocument.readyState === 'complete' || iframeDocument.body.innerHTML !== '') {
                        loadingMessage.style.display = 'none';
                        iframe.style.display = 'block'; 
                    }
                } catch (e) {
                    loadingMessage.style.display = 'none';
                    iframe.style.display = 'block'; 
                }
            }, 0); 
        }
    </script>
</head>
<body onload="checkIframe()">
    <div id="loadingMessage">Cargando aplicación...</div>

        <iframe id="iframeCotizador" src="https://script.google.com/macros/s/AKfycbwd_E4MnPEYZpSGbGyVl5lG06LEvo_8j_t2z_I_MPUYuZfyQne9lPbxzUAjtl4ltEos/exec"></iframe>

</body>
</html>
