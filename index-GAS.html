<!DOCTYPE html>
<!-- ATENCIÓN: este archivo ya está implícito dentro del proyecto de Google Apps Script de la Google Sheet que copias -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= title ?></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f2;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1a1a1a;
    }

    html {
      scroll-padding-top: 80px;
    }

    section[id] {
      scroll-margin-top: 80px;
    }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1030;
      background-color: #111;
    }

    .header-brand {
      padding: 18px 24px 14px;
    }

    .header-brand .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      margin: 0 0 4px;
    }

    .header-brand h1 {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: white;
      margin: 0;
    }

    /* ── Category nav ── */
    .category-nav {
      background: #1a1a1a;
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .category-nav::-webkit-scrollbar { display: none; }

    .category-nav a {
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .category-nav a:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    /* ── Section heading ── */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin: 0 0 18px;
    }

    /* ── Product cards ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 40px;
    }

    .product-card {
      background: #fff;
      border: 0.5px solid #e0e0dc;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .product-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .product-card .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-card h5 {
      font-size: 14px;
      font-weight: 500;
      margin: 0 0 6px;
      color: #1a1a1a;
    }

    .product-card p.desc {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin: 0 0 12px;
      flex: 1;
    }

    .product-card .price {
      font-size: 14px;
      font-weight: 500;
      color: #c0392b;
      margin: 0;
    }

    /* ── Footer ── */
    footer {
      background: #111;
      color: rgba(255,255,255,0.45);
      padding: 20px 24px;
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    footer a {
      color: rgba(255,255,255,0.75);
      text-decoration: underline;
    }

    .qr-block {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
    }

    .qr-block p {
      margin: 0;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .qr-block img {
      width: 72px;
      height: auto;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-brand">
      <p class="eyebrow">Menú digital</p>
      <h1><?= title ?></h1>
    </div>
    <nav class="category-nav">
      <? for (const category in itemsByCategory) { ?>
        <a href="#<?= category ?>"><?= category ?></a>
      <? } ?>
    </nav>
  </header>

  <main>
    <? for (const category in itemsByCategory) { ?>
      <section id="<?= category ?>">
        <p class="section-label"><?= category ?></p>
        <div class="products-grid">
          <? for (const item of itemsByCategory[category]) { ?>
            <div class="product-card">
              <? if (item.image && item.image.trim() !== "") { ?>
                <img src="<?= item.image ?>" alt="<?= item.product ?>">
              <? } ?>
              <div class="card-body">
                <h5><?= item.product ?></h5>
                <p class="desc"><?= item.description ?></p>
                <p class="price">$<?= item.price ?></p>
              </div>
            </div>
          <? } ?>
        </div>
      </section>
    <? } ?>
  </main>

  <footer>
    <span>© 2025 — Desarrollado por <a href="https://ddw.com.ar" target="_blank">DDW</a></span>
    <div class="qr-block">
      <p>Accedé desde<br>este QR</p>
      <img
        src="https://landings.ddw.com.ar/restaurante-menu-qr/qr_menu_restaurant_demoddw.png"
        alt="QR del menú"
      >
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
