<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= title ?></title>
  <!-- ATENCIÓN: este archivo ya está implícito dentro del proyecto de Google Apps Script de la Google Sheet que copias -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Íconos Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* Header con polaridad negativa */
    .sticky-top {
      z-index: 1030;
      background-color: #000 !important;
      color: white;
    }

        /* Eliminar margen superior por defecto */
    body {
    //  margin-top: 0;
    //  background-color: #f8f9fa;
    //  padding-top: 70px; /* Ajuste para el header fijo */

  margin: 0;
  padding: 0;

    }
    
    /* Quitar margen superior innecesario */
    html {
      scroll-padding-top: 70px; /* Ajuste para el scroll de anclas */
    }
    
    /* Estilos para secciones con scroll suave y offset */
    section[id] {
      scroll-margin-top: 70px;
    }
    
    .category-icon {
      font-size: 1.5rem;
      margin-right: 8px;
    }
    
    .menu-item-card {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 15px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      margin-bottom: 15px;
    }
    
    .menu-item-card img {
      max-width: 120px;
      height: auto;
    }
    
    /* Footer con polaridad negativa */
    footer {
      background-color: #000;
      color: white;
      padding: 15px 0;
    }
  </style>
</head>
<body>
  <!-- Encabezado -->
  <header class="sticky-top shadow-sm bg-black text-white">
    <div class="container d-flex align-items-center py-2">
         <img src="png-clipart-graphics-restaurant-logo-restaurant.png" alt="Logo del Restaurante" width="225" height="60">
      <h1 class="h4 mb-0"><?= title ?></h1>
    </div>
    <!-- Slideshow de categorías -->
    <div class="bg-dark py-2 shadow-sm">
      <div class="container d-flex overflow-auto">
        <? for (const category in itemsByCategory) { ?>
          <a href="#<?= category ?>" class="btn btn-outline-light me-2">
            <i class="bi bi-tags category-icon"></i><?= category ?>
          </a>
        <? } ?>
      </div>
    </div>
  </header>

  <!-- Secciones del menú -->
  <main class="container mt-4">
    <? for (const category in itemsByCategory) { ?>
      <section id="<?= category ?>" class="mb-5">
        <h4 class="section-title"><?= category ?></h4>
        <div class="row">
          <? for (const item of itemsByCategory[category]) { ?>
            <div class="col-md-4">
              <div class="card mb-3">
                <? if (item.image && item.image.trim() !== "") { ?>
                  <img src="<?= item.image ?>" class="card-img-top" alt="<?= item.product ?>">
                <? } ?>
                <div class="card-body">
                  <h5 class="card-title"><?= item.product ?></h5>
                  <p class="card-text"><?= item.description ?></p>
                  <p class="card-text text-danger fw-bold">$<?= item.price ?></p>
                </div>
              </div>
            </div>
          <? } ?>
        </div>
      </section>
    <? } ?>
  </main>

<!-- Pie de página -->
<footer class="text-center bg-black text-white">
  <p class="mb-0">
    © 2024 - Menú para Restaurante - Desarrollado por 
    <a href="https://ddw.com.ar" target="_blank" style="color: white; text-decoration: underline;">DDW</a>.
  </p>
</footer>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
